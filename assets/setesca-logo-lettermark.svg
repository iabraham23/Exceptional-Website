<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Setesca Partners Lettermark Concept</title>
  <desc id="desc">Gold monogram SP inside a circular seal with Setesca Partners wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0C141D"/>
      <stop offset="100%" stop-color="#182330"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E0C675"/>
      <stop offset="100%" stop-color="#B9912F"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>

  <g transform="translate(355 500)">
    <circle cx="0" cy="0" r="210" fill="none" stroke="url(#gold)" stroke-width="8"/>
    <circle cx="0" cy="0" r="182" fill="none" stroke="#C9A84C" stroke-opacity="0.45" stroke-width="2"/>
    <text x="-72" y="88" fill="url(#gold)" font-family="'Times New Roman', Georgia, serif" font-size="290" font-weight="600" filter="url(#glow)">S</text>
    <text x="18" y="88" fill="#E7CF86" fill-opacity="0.92" font-family="'Times New Roman', Georgia, serif" font-size="290" font-weight="600">P</text>
  </g>

  <g transform="translate(670 402)">
    <text x="0" y="0" fill="#F4E8C8" font-family="'Times New Roman', Georgia, serif" font-size="108" letter-spacing="7">SETESCA</text>
    <rect x="1" y="39" width="690" height="2" fill="#C9A84C" fill-opacity="0.7"/>
    <text x="2" y="108" fill="#D8BF72" font-family="'Helvetica Neue', Arial, sans-serif" font-size="46" letter-spacing="13">PARTNERS</text>
  </g>
</svg>

  <rect width="512" height="512" fill="#111830"/>

  <rect x="165" y="98" width="69" height="8" rx="4" fill="url(#gold)"/>
  <rect x="278" y="98" width="69" height="8" rx="4" fill="url(#gold)"/>
  <circle cx="256" cy="98" r="16" fill="url(#gold)"/>
  <rect x="249" y="109" width="14" height="19" rx="6" fill="url(#gold)"/>

  <path d="M256 124 L355 344 Q256 335 157 344 Z" fill="url(#beam)"/>
  <ellipse cx="256" cy="388" rx="152" ry="20" fill="url(#stage)"/>
  <ellipse cx="256" cy="388" rx="152" ry="20" fill="url(#stage)" opacity="0.25" transform="translate(0 4) scale(0.97 0.9)"/>

<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Setesca Hybrid Emblem Concept</title>
  <desc id="desc">Hybrid Setesca logo with gold double-circle outlines and a clean geometric star emblem.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F1721"/>
      <stop offset="100%" stop-color="#1A2635"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E4CE84"/>
      <stop offset="45%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#A67D28"/>
    </linearGradient>
    <linearGradient id="goldSoft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EDDCA4"/>
      <stop offset="100%" stop-color="#C39A3C"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>

  <g transform="translate(370 500)">
    <circle cx="0" cy="0" r="212" fill="none" stroke="url(#gold)" stroke-width="9"/>
    <circle cx="0" cy="0" r="174" fill="none" stroke="#D9BC68" stroke-opacity="0.62" stroke-width="2.5"/>

    <polygon points="0,-146 34,-34 0,0 -34,-34" fill="url(#goldSoft)"/>
    <polygon points="146,0 34,34 0,0 34,-34" fill="#C9A84C"/>
    <polygon points="0,146 -34,34 0,0 34,34" fill="#B9912F"/>
    <polygon points="-146,0 -34,-34 0,0 -34,34" fill="#DDBF6C"/>

    <circle cx="0" cy="0" r="25" fill="#1C2837"/>
    <circle cx="0" cy="0" r="10" fill="#EBD79A"/>
  </g>

  <g transform="translate(710 410)">
    <text x="0" y="0" fill="#F4E8C8" font-family="'Times New Roman', Georgia, serif" font-size="108" letter-spacing="7">SETESCA</text>
    <rect x="2" y="38" width="650" height="2" fill="#C9A84C" fill-opacity="0.8"/>
    <text x="2" y="104" fill="#D9C27A" font-family="'Helvetica Neue', Arial, sans-serif" font-size="42" letter-spacing="10">PARTNERS</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Setesca Wealth Compass Concept</title>
  <desc id="desc">Compass-star emblem with Setesca Wealth Group wordmark in a gold palette.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F4EFE3"/>
      <stop offset="100%" stop-color="#ECE3D2"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#DABE6A"/>
      <stop offset="100%" stop-color="#B78D2D"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>

  <g transform="translate(360 500)">
    <circle cx="0" cy="0" r="208" fill="none" stroke="#213042" stroke-width="9"/>
    <circle cx="0" cy="0" r="171" fill="none" stroke="#213042" stroke-opacity="0.35" stroke-width="2"/>

    <polygon points="0,-144 32,-32 0,0 -32,-32" fill="url(#gold)"/>
    <polygon points="144,0 32,32 0,0 32,-32" fill="#C39A3C"/>
    <polygon points="0,144 -32,32 0,0 32,32" fill="#D6BA66"/>
    <polygon points="-144,0 -32,-32 0,0 -32,32" fill="#B9912F"/>

    <circle cx="0" cy="0" r="22" fill="#213042"/>
    <circle cx="0" cy="0" r="10" fill="#E8D29B"/>
  </g>

  <g transform="translate(680 410)">
    <text x="0" y="0" fill="#1E2B38" font-family="'Times New Roman', Georgia, serif" font-size="106" letter-spacing="7">SETESCA</text>
    <rect x="2" y="36" width="700" height="2" fill="#B9912F" fill-opacity="0.85"/>
    <text x="2" y="102" fill="#3B4958" font-family="'Helvetica Neue', Arial, sans-serif" font-size="42" letter-spacing="9">WEALTH GROUP</text>
  </g>
</svg>
